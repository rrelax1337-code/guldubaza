<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💖 Sen uchun 💖</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #ff758c, #ff7eb3);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial;
            overflow-x: hidden;
        }
        .card {
            background: white;
            padding: 50px;
            border-radius: 50px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            max-width: 500px;
            margin: 20px;
        }
        .heart {
            font-size: 80px;
            animation: beat 1s infinite;
            display: inline-block;
        }
        @keyframes beat {
            0%,100%{transform:scale(1);}
            50%{transform:scale(1.2);}
        }
        h1 {
            color: #ff3366;
        }
        button {
            background: #ff3366;
            color: white;
            border: none;
            padding: 12px 30px;
            margin: 10px;
            border-radius: 30px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover {
            background: #ff5588;
            transform: scale(1.05);
        }
        .msg {
            margin-top: 20px;
            padding: 15px;
            background: #ffeef4;
            border-radius: 20px;
            display: none;
            color: #ff3366;
        }
        .flower {
            position: fixed;
            font-size: 25px;
            pointer-events: none;
            animation: fall 5s linear forwards;
        }
        @keyframes fall {
            0% { transform: translateY(-100px); opacity: 1; }
            100% { transform: translateY(100vh); opacity: 0; }
        }
    </style>
</head>
<body>

<div class="card">
    <div class="heart">💖</div>
    <h1>Salom go'zalim!</h1>
    <p style="font-size: 18px;">Sen bu sahifaga kirganing bilan yuragim tez ura boshladi 💓</p>
    <button onclick="showLove()">💗 Men ham sevaman</button>
    <button onclick="showGift()">🎁 Sovg'a</button>
    <div id="msg" class="msg"></div>
    <p style="margin-top: 30px; font-style: italic; color: #ff6699;">🌹 Seni sevaman, jonim! 🌹</p>
</div>

<script>
    function showLove() {
        let m = document.getElementById('msg');
        m.innerHTML = '💞 Men ham seni juda SEVAMAN! Sen eng go\'zalsan! 😘💕';
        m.style.display = 'block';
        for(let i=0;i<30;i++) setTimeout(()=>createHeart(), i*50);
        setTimeout(()=> m.style.display='none', 4000);
    }
    function showGift() {
        let m = document.getElementById('msg');
        m.innerHTML = '🎁 Sovg\'a: Sening tabassuming! Har kuni seni ko\'rish baxt! 💝✨';
        m.style.display = 'block';
        for(let i=0;i<20;i++) setTimeout(()=>createFlower(), i*80);
        setTimeout(()=> m.style.display='none', 4000);
    }
    function createHeart() {
        let h = document.createElement('div');
        h.innerHTML = '💖';
        h.classList.add('flower');
        h.style.left = Math.random() * window.innerWidth + 'px';
        h.style.top = '0px';
        document.body.appendChild(h);
        setTimeout(()=> h.remove(), 5000);
    }
    function createFlower() {
        let f = document.createElement('div');
        f.innerHTML = ['🌸','🌹','🌺','💐'][Math.floor(Math.random()*4)];
        f.classList.add('flower');
        f.style.left = Math.random() * window.innerWidth + 'px';
        f.style.top = '0px';
        document.body.appendChild(f);
        setTimeout(()=> f.remove(), 5000);
    }
    setInterval(()=> createHeart(), 1000);
    setInterval(()=> createFlower(), 2000);
</script>

</body>
</html>
