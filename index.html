<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>GulduBaza  | HEMIS Tizim</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #4361ee;
            --primary-dark: #3a56d4;
            --primary-light: #eef2ff;
            --secondary: #7209b7;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --info: #3b82f6;
            --dark: #1e293b;
            --light: #f8fafc;
            --gray: #64748b;
            --border: #e2e8f0;
            --card-bg: #ffffff;
            --sidebar-bg: #ffffff;
            --header-bg: #ffffff;
        }

        body.dark {
            --primary-light: #1e293b;
            --dark: #f1f5f9;
            --light: #0f172a;
            --border: #334155;
            --card-bg: #1e293b;
            --sidebar-bg: #0f172a;
            --header-bg: #1e293b;
            background: #0f172a;
            color: #e2e8f0;
        }

        body {
            font-family: 'Segoe UI', 'Roboto', system-ui, sans-serif;
            background: var(--light);
            min-height: 100vh;
            transition: all 0.3s ease;
        }

        /* Login */
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }

        .login-card {
            background: var(--card-bg);
            border-radius: 32px;
            padding: 48px 40px;
            width: 100%;
            max-width: 460px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            animation: fadeInUp 0.5s ease;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-header h1 {
            font-size: 2.5em;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .login-type {
            display: flex;
            gap: 12px;
            margin-bottom: 28px;
        }

        .login-type-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid var(--border);
            background: transparent;
            border-radius: 16px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        .login-type-btn.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-color: transparent;
        }

        .login-card input {
            width: 100%;
            padding: 14px 16px;
            margin-bottom: 16px;
            border: 2px solid var(--border);
            border-radius: 16px;
            font-size: 16px;
            background: var(--card-bg);
            color: var(--dark);
        }

        .login-card button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .login-card button:hover {
            transform: translateY(-2px);
        }

        /* App */
        .app-container {
            display: none;
            max-width: 1600px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        .header {
            background: var(--header-bg);
            border-radius: 24px;
            padding: 16px 28px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            border: 1px solid var(--border);
        }

        .logo h2 {
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 1.8em;
        }

        .header-controls {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .lang-btn, .theme-btn {
            padding: 8px 16px;
            border: 1px solid var(--border);
            background: var(--card-bg);
            border-radius: 12px;
            cursor: pointer;
            font-weight: 500;
        }

        /* Layout */
        .main-layout {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
        }

        .sidebar {
            width: 280px;
            background: var(--sidebar-bg);
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            border: 1px solid var(--border);
            height: fit-content;
            position: sticky;
            top: 20px;
        }

        .sidebar-item {
            padding: 12px 16px;
            margin-bottom: 6px;
            border-radius: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.2s;
            font-weight: 500;
        }

        .sidebar-item:hover {
            background: var(--primary-light);
        }

        .sidebar-item.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .content {
            flex: 1;
            min-width: 300px;
        }

        /* Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 28px;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 24px;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            border: 1px solid var(--border);
            transition: transform 0.2s;
        }

        .stat-card:hover {
            transform: translateY(-4px);
        }

        .stat-card h3 {
            font-size: 2.5em;
            color: var(--primary);
        }

        .card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            border: 1px solid var(--border);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 16px;
        }

        /* Tables */
        .table-wrapper {
            overflow-x: auto;
            border-radius: 16px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 14px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        th {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            font-weight: 600;
        }

        tr:hover {
            background: var(--primary-light);
        }

        /* Forms */
        input, select, textarea {
            padding: 12px 14px;
            border: 2px solid var(--border);
            border-radius: 14px;
            font-size: 14px;
            background: var(--card-bg);
            color: var(--dark);
            transition: all 0.2s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
        }

        /* Buttons */
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-warning { background: var(--warning); color: white; }
        .btn-success { background: var(--success); color: white; }
        .btn-sm { padding: 6px 12px; font-size: 12px; }
        .btn:hover { transform: translateY(-1px); filter: brightness(1.05); }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
        }

        .modal-content {
            background: var(--card-bg);
            padding: 32px;
            border-radius: 28px;
            width: 90%;
            max-width: 600px;
            max-height: 85vh;
            overflow-y: auto;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        /* Search */
        .search-box {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .search-box input {
            flex: 1;
        }

        /* Notification */
        .notification {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--success);
            color: white;
            padding: 14px 24px;
            border-radius: 16px;
            font-weight: 600;
            z-index: 1100;
            animation: slideInRight 0.3s ease;
        }

        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @media (max-width: 768px) {
            .sidebar { width: 100%; position: static; }
            .form-row { grid-template-columns: 1fr; }
            .card-header { flex-direction: column; align-items: stretch; }
        }
    </style>
</head>
<body>

        function saveData() {
            const data = { students, teachers, subjects, groups, grades, schedules, contracts, payments };
            localStorage.setItem('guldu_pro_data', JSON.stringify(data));
        }

        function loadData() {
            const data = JSON.parse(localStorage.getItem('guldu_pro_data'));
            if (data) {
                students = data.students || [];
                teachers = data.teachers || [];
                subjects = data.subjects || [];
                groups = data.groups || [];
                grades = data.grades || [];
                schedules = data.schedules || [];
                contracts = data.contracts || [];
                payments = data.payments || [];
            }
        }

        function showNotification(msg, type = 'success') {
            const notif = document.createElement('div');
            notif.className = 'notification';
            notif.textContent = msg;
            notif.style.background = type === 'success' ? '#10b981' : type === 'error' ? '#ef4444' : '#f59e0b';
            document.body.appendChild(notif);
            setTimeout(() => notif.remove(), 2500);
        }

        // ==================== LOGIN ====================
        function setLoginType(type) {
            currentUserType = type;
            document.querySelectorAll('.login-type-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
        }

        function login() {
            const id = document.getElementById('loginId').value.trim();
            const password = document.getElementById('loginPassword').value;
            const errorDiv = document.getElementById('loginError');

            if (currentUserType === 'admin') {
                if (id === 'admin' && password === 'admin123') {
                    currentUser = { id: 'admin', name: 'Administrator', type: 'admin' };
                    showApp();
                    errorDiv.style.display = 'none';
                    showNotification('Xush kelibsiz, Administrator!');
                } else {
                    errorDiv.textContent = '❌ Admin login yoki parol noto\'g\'ri! (admin / admin)';
                    errorDiv.style.display = 'block';
                }
            } else {
                const student = students.find(s => s.id === id && s.password === password);
                if (student) {
                    currentUser = { ...student, type: 'student' };
                    showApp();
                    errorDiv.style.display = 'none';
                    showNotification(`Xush kelibsiz, ${student.fullName}!`);
                } else {
                    errorDiv.textContent = '❌ Talaba ID yoki parol noto\'g\'ri! (Masalan: ST001 / 12345)';
                    errorDiv.style.display = 'block';
                }
            }
        }

                else if (page === 'groups') renderGroupsPage();
                else if (page === 'grades') renderGradesPage();
                else if (page === 'schedule') renderSchedulePage();
                else if (page === 'contracts') renderContractsPage();
                else if (page === 'payments') renderPaymentsPage();

            currentEditItem = item;
            let html = '';
            
            if (type === 'student') {
                html = `<div class="form-group"><label>ID *</label><input id="sId" value="${item?.id || ''}" ${item ? 'readonly' : ''} placeholder="Masalan: ST001"></div>
                <div class="form-group"><label>Ism Familiya *</label><input id="sName" value="${item?.fullName || ''}" placeholder="Alisher Karimov"></div>
                <div class="form-row"><div class="form-group"><label>Fakultet</label><input id="sFaculty" value="${item?.faculty || ''}"></div>
                <div class="form-group"><label>Guruh ID</label><input id="sGroup" value="${item?.groupId || ''}"></div></div>
                <div class="form-row"><div class="form-group"><label>Kurs</label><input id="sCourse" value="${item?.course || ''}" type="number"></div>
                <div class="form-group"><label>Telefon</label><input id="sPhone" value="${item?.phone || ''}"></div></div>
                <div class="form-row"><div class="form-group"><label>Email</label><input id="sEmail" value="${item?.email || ''}"></div>
                <div class="form-group"><label>Parol *</label><input id="sPassword" value="${item?.password || ''}" type="text"></div></div>
                <div class="form-group"><label>Manzil</label><input id="sAddress" value="${item?.address || ''}"></div>`;
            } else if (type === 'teacher') {
                html = `<div class="form-group"><label>ID *</label><input id="tId" value="${item?.id || ''}" ${item ? 'readonly' : ''} placeholder="T001"></div>
                <div class="form-group"><label>Ism Familiya *</label><input id="tName" value="${item?.fullName || ''}"></div>
                <div class="form-row"><div class="form-group"><label>Lavozimi</label><input id="tPosition" value="${item?.position || ''}"></div>
                <div class="form-group"><label>Telefon</label><input id="tPhone" value="${item?.phone || ''}"></div></div>
                <div class="form-row"><div class="form-group"><label>Email</label><input id="tEmail" value="${item?.email || ''}"></div>
                <div class="form-group"><label>Parol</label><input id="tPassword" value="${item?.password || ''}" type="text"></div></div>`;
            } else if (type === 'subject') {
                html = `<div class="form-group"><label>ID *</label><input id="subId" value="${item?.id || ''}" ${item ? 'readonly' : ''} placeholder="SUB001"></div>
                <div class="form-group"><label>Fan nomi *</label><input id="subName" value="${item?.name || ''}"></div>
                <div class="form-row"><div class="form-group"><label>Kod</label><input id="subCode" value="${item?.code || ''}"></div>
                <div class="form-group"><label>Kredit</label><input id="subCredits" value="${item?.credits || 3}" type="number"></div></div>
                <div class="form-row"><div class="form-group"><label>Semestr</label><input id="subSemester" value="${item?.semester || 1}" type="number"></div>
                <div class="form-group"><label>O'qituvchi</label><select id="subTeacher">${teachers.map(t => `<option value="${t.id}" ${item?.teacherId === t.id ? 'selected' : ''}>${t.fullName}</option>`).join('')}</select></div></div>`;
            } else if (type === 'group') {
                html = `<div class="form-group"><label>ID *</label><input id="gId" value="${item?.id || ''}" ${item ? 'readonly' : ''} placeholder="GRP001"></div>
                <div class="form-group"><label>Guruh nomi *</label><input id="gName" value="${item?.name || ''}"></div>
                <div class="form-row"><div class="form-group"><label>Fakultet</label><input id="gFaculty" value="${item?.faculty || ''}"></div>
                <div class="form-group"><label>Kurs</label><input id="gCourse" value="${item?.course || 1}" type="number"></div></div>
                <div class="form-group"><label>Fanlar (ID vergul bilan)</label><input id="gSubjects" value="${(item?.subjectIds || []).join(',')}" placeholder="SUB001,SUB002"></div>`;
            } else if (type === 'grade') {
                html = `<div class="form-group"><label>Talaba</label><select id="grStudent">${students.map(s => `<option value="${s.id}" ${item?.studentId === s.id ? 'selected' : ''}>${s.fullName}</option>`).join('')}</select></div>
                <div class="form-group"><label>Fan</label><select id="grSubject">${subjects.map(s => `<option value="${s.id}" ${item?.subjectId === s.id ? 'selected' : ''}>${s.name}</option>`).join('')}</select></div>
                <div class="form-row"><div class="form-group"><label>1-baho</label><input id="gr1" value="${item?.grade1 || 0}" type="number" min="0" max="100"></div>
                <div class="form-group"><label>2-baho</label><input id="gr2" value="${item?.grade2 || 0}" type="number" min="0" max="100"></div></div>
                <div class="form-group"><label>Yakuniy</label><input id="grFinal" value="${item?.final || 0}" type="number" min="0" max="100"></div>`;
            } else if (type === 'schedule') {
                html = `<div class="form-group"><label>Guruh</label><select id="schGroup">${groups.map(g => `<option value="${g.id}" ${item?.groupId === g.id ? 'selected' : ''}>${g.name}</option>`).join('')}</select></div>
                <div class="form-group"><label>Fan</label><select id="schSubject">${subjects.map(s => `<option value="${s.id}" ${item?.subjectId === s.id ? 'selected' : ''}>${s.name}</option>`).join('')}</select></div>
                <div class="form-row"><div class="form-group"><label>Kun</label><select id="schDay"><option>Dushanba</option><option>Seshanba</option><option>Chorshanba</option><option>Payshanba</option><option>Juma</option><option>Shanba</option></select></div>
                <div class="form-group"><label>Vaqt</label><input id="schTime" value="${item?.time || '09:00-10:30'}" placeholder="09:00-10:30"></div></div>
                <div class="form-row"><div class="form-group"><label>Xona</label><input id="schRoom" value="${item?.room || ''}"></div>
                <div class="form-group"><label>Tur</label><select id="schType"><option>Ma\'ruza</option><option>Amaliyot</option><option>Laboratoriya</option></select></div></div>`;
            } else if (type === 'contract') {
                html = `<div class="form-group"><label>Talaba</label><select id="cStudent">${students.map(s => `<option value="${s.id}" ${item?.studentId === s.id ? 'selected' : ''}>${s.fullName}</option>`).join('')}</select></div>
                <div class="form-row"><div class="form-group"><label>Summa</label><input id="cAmount" value="${item?.amount || 0}" type="number"></div>
                <div class="form-group"><label>To'langan</label><input id="cPaid" value="${item?.paid || 0}" type="number"></div></div>
                <div class="form-row"><div class="form-group"><label>Sana</label><input id="cDate" value="${item?.date || new Date().toISOString().split('T')[0]}" type="date"></div>
                <div class="form-group"><label>Holat</label><select id="cStatus"><option>to\'langan</option><option>qisman</option><option>qarz</option></select></div></div>`;
            } else if (type === 'payment') {
                html = `<div class="form-group"><label>Talaba</label><select id="pStudent">${students.map(s => `<option value="${s.id}" ${item?.studentId === s.id ? 'selected' : ''}>${s.fullName}</option>`).join('')}</select></div>
                <div class="form-row"><div class="form-group"><label>Summa</label><input id="pAmount" value="${item?.amount || 0}" type="number"></div>
                <div class="form-group"><label>Sana</label><input id="pDate" value="${item?.date || new Date().toISOString().split('T')[0]}" type="date"></div></div>
                <div class="form-row"><div class="form-group"><label>Tur</label><select id="pType"><option>Kontrakt</option><option>Boshqa</option></select></div>
                <div class="form-group"><label>Holat</label><select id="pStatus"><option>tasdiqlangan</option><option>kutilmoqda</option></select></div></div>`;
            }
            
            document.getElementById('modalTitle').innerHTML = item ? `✏️ ${t('edit')} ${type}` : `➕ ${t('add')} ${type}`;
            document.getElementById('modalBody').innerHTML = html;
            document.getElementById('modal').style.display = 'flex';
        }

        function saveModal() {
            if (currentModalType === 'student') {
                const data = {
                    id: document.getElementById('sId').value,
                    fullName: document.getElementById('sName').value,
                    faculty: document.getElementById('sFaculty').value,
                    groupId: document.getElementById('sGroup').value,
                    course: parseInt(document.getElementById('sCourse').value) || 1,
                    phone: document.getElementById('sPhone').value,
                    email: document.getElementById('sEmail').value,
                    password: document.getElementById('sPassword').value,
                    address: document.getElementById('sAddress').value
                };
                if (currentEditItem) {
                    const index = students.findIndex(s => s.id === currentEditItem.id);
                    if (index !== -1) students[index] = data;
                } else {
                    if (students.find(s => s.id === data.id)) { showNotification('Bu ID allaqachon mavjud!', 'error'); return; }
                    students.push(data);
                }
                saveData();
                renderStudentsTable();
                showNotification('Talaba saqlandi');
            } else if (currentModalType === 'teacher') {
                const data = {
                    id: document.getElementById('tId').value,
                    fullName: document.getElementById('tName').value,
                    position: document.getElementById('tPosition').value,
                    phone: document.getElementById('tPhone').value,
                    email: document.getElementById('tEmail').value,
                    password: document.getElementById('tPassword').value,
                    subjectIds: []
                };
                if (currentEditItem) {
                    const index = teachers.findIndex(t => t.id === currentEditItem.id);
                    if (index !== -1) teachers[index] = data;
                } else {
                    teachers.push(data);
                }
                saveData();
                renderTeachersTable();
                showNotification('O\'qituvchi saqlandi');
            } else if (currentModalType === 'subject') {
                const data = {
                    id: document.getElementById('subId').value,
                    name: document.getElementById('subName').value,
                    code: document.getElementById('subCode').value,
                    credits: parseInt(document.getElementById('subCredits').value) || 3,
                    semester: parseInt(document.getElementById('subSemester').value) || 1,
                    teacherId: document.getElementById('subTeacher').value
                };
                if (currentEditItem) {
                    const index = subjects.findIndex(s => s.id === currentEditItem.id);
                    if (index !== -1) subjects[index] = data;
                } else {
                    subjects.push(data);
                }
                saveData();
                renderSubjectsTable();
                showNotification('Fan saqlandi');
            } else if (currentModalType === 'group') {
                const data = {
                    id: document.getElementById('gId').value,
                    name: document.getElementById('gName').value,
                    faculty: document.getElementById('gFaculty').value,
                    course: parseInt(document.getElementById('gCourse').value) || 1,
                    subjectIds: document.getElementById('gSubjects').value.split(',').map(s => s.trim()).filter(s => s)
                };
                if (currentEditItem) {
                    const index = groups.findIndex(g => g.id === currentEditItem.id);
                    if (index !== -1) groups[index] = data;
                } else {
                    groups.push(data);
                }
                saveData();
                renderGroupsTable();
                showNotification('Guruh saqlandi');
            } else if (currentModalType === 'grade') {
                const data = {
                    id: currentEditItem?.id || 'GRD' + Date.now(),
                    studentId: document.getElementById('grStudent').value,
                    subjectId: document.getElementById('grSubject').value,
                    grade1: parseInt(document.getElementById('gr1').value) || 0,
                    grade2: parseInt(document.getElementById('gr2').value) || 0,
                    final: parseInt(document.getElementById('grFinal').value) || 0,
                    total: parseInt(document.getElementById('grFinal').value) || 0,
                    letter: getLetterGrade(parseInt(document.getElementById('grFinal').value) || 0)
                };
                if (currentEditItem) {
                    const index = grades.findIndex(g => g.id === currentEditItem.id);
                    if (index !== -1) grades[index] = data;
                } else {
                    grades.push(data);
                }
                saveData();
                renderGradesTable();
                showNotification('Baho saqlandi');
            } else if (currentModalType === 'schedule') {
                const data = {
                    id: currentEditItem?.id || 'SCH' + Date.now(),
                    groupId: document.getElementById('schGroup').value,
                    subjectId: document.getElementById('schSubject').value,
                    day: document.getElementById('schDay').value,
                    dayNum: getDayNum(document.getElementById('schDay').value),
                    time: document.getElementById('schTime').value,
                    room: document.getElementById('schRoom').value,
                    type: document.getElementById('schType').value,
                    teacherId: subjects.find(s => s.id === document.getElementById('schSubject').value)?.teacherId
                };
                if (currentEditItem) {
                    const index = schedules.findIndex(s => s.id === currentEditItem.id);
                    if (index !== -1) schedules[index] = data;
                } else {
                    schedules.push(data);
                }
                saveData();
                renderScheduleTable();
                showNotification('Dars jadvali saqlandi');
            } else if (currentModalType === 'contract') {
                const amount = parseInt(document.getElementById('cAmount').value) || 0;
                const paid = parseInt(document.getElementById('cPaid').value) || 0;
                const data = {
                    id: currentEditItem?.id || 'CNT' + Date.now(),
                    studentId: document.getElementById('cStudent').value,
                    amount: amount,
                    paid: paid,
                    debt: amount - paid,
                    status: document.getElementById('cStatus').value,
                    date: document.getElementById('cDate').value
                };
                if (currentEditItem) {
                    const index = contracts.findIndex(c => c.id === currentEditItem.id);
                    if (index !== -1) contracts[index] = data;
                } else {
                    contracts.push(data);
                }
                saveData();
                renderContractsTable();
                showNotification('Shartnoma saqlandi');
            } else if (currentModalType === 'payment') {
                const data = {
                    id: currentEditItem?.id || 'PAY' + Date.now(),
                    studentId: document.getElementById('pStudent').value,
                    amount: parseInt(document.getElementById('pAmount').value) || 0,
                    date: document.getElementById('pDate').value,
                    type: document.getElementById('pType').value,
                    status: document.getElementById('pStatus').value
                };
                if (currentEditItem) {
                    const index = payments.findIndex(p => p.id === currentEditItem.id);
                    if (index !== -1) payments[index] = data;
                } else {
                    payments.push(data);
                }
                saveData();
                renderPaymentsTable();
                showNotification('To\'lov saqlandi');
            }
            closeModal();
        }

        function getLetterGrade(score) {
            if (score >= 90) return 'A';
            if (score >= 80) return 'B';
            if (score >= 70) return 'C';
            if (score >= 60) return 'D';
            return 'F';
        }

        function getDayNum(day) {
            const days = { 'Dushanba': 1, 'Seshanba': 2, 'Chorshanba': 3, 'Payshanba': 4, 'Juma': 5, 'Shanba': 6 };
            return days[day] || 1;
        }

        function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }
        function changeLanguage() { currentLang = document.getElementById('languageSelect').value; if (currentUser) { renderSidebar(); loadPage(currentPage); } }
        function toggleTheme() { document.body.classList.toggle('dark'); }
        function closeModal() { document.getElementById('modal').style.display = 'none'; currentEditItem = null; }

        // ==================== INIT ====================
        initData();
        setLoginType('admin');
    </script>
</body>
</html>
